<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.5s, color 0.5s;
        }

        .container {
            max-width: 400px;
            width: 90%;
            background: rgba(255, 255, 255, 0.4); /* 减少透明度 */
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        h1 {
            margin-bottom: 20px;
        }

        .song-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .song-item:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 滚动条样式 */
        .song-list::-webkit-scrollbar {
            width: 8px;
        }

        .song-list::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .song-list::-webkit-scrollbar-track {
            background-color: transparent;
        }

        .player-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-direction: column;
        }

        .progress-container {
            width: 80%;
            margin: 10px auto;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            height: 100%;
            background-color: #ff4d4d;
            border-radius: 5px;
            transition: width 0.3s;
            position: absolute;
            top: 0;
            left: 0;
        }

        .time-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 80%;
            margin: 10px auto;
        }

        .current-time,
        .duration {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            cursor: pointer;
            margin: 0 10px;
        }

        .control-btn:hover {
            opacity: 0.8;
        }

        .play-btn {
            background-image: url('https://img.icons8.com/fluency/48/000000/play.png');
        }

        .pause-btn {
            background-image: url('https://img.icons8.com/fluency/48/000000/pause.png');
        }

        .prev-btn {
            background-image: url('https://img.icons8.com/fluency/48/000000/previous.png');
        }

        .next-btn {
            background-image: url('https://img.icons8.com/fluency/48/000000/next.png');
        }

        .control-btn {
            background-repeat: no-repeat;
            background-position: center;
            background-size: 24px;
        }

        .sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .sidebar-btn {
            width: 40px;
            height: 40px;
            margin: 10px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .sidebar-btn:hover {
            opacity: 0.8;
        }

        .back-btn {
            background-image: url('https://img.icons8.com/fluency/48/000000/back.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 24px;
        }

        .change-bg-btn {
            background-image: url('https://img.icons8.com/fluency/48/000000/paint.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 24px;
        }

        .switch-theme-btn {
            width: 40px;
            height: 40px;
            margin: 10px;
            cursor: pointer;
            transition: opacity 0.3s;
            background-image: url('https://img.icons8.com/fluency/48/000000/moon.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 24px;
        }

        .light-theme {
            background-color: #ffffff;
            color: #000000;
            transition: background-color 0.5s, color 0.5s;
        }

        .light-theme .song-item {
            background: rgba(0, 0, 0, 0.1);
            color: #000000;
        }

        .light-theme .container {
            background: #ffffff;
        }

        .light-theme .progress-bar {
            background-color: rgba(0, 0, 0, 0.2);
        }

        .light-theme .progress-filled {
            background-color: #ff4d4d;
        }

        .dark-theme {
            background-color: #121212;
            color: white;
            transition: background-color 0.5s, color 0.5s;
        }

        .dark-theme .song-item {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .dark-theme .container {
            background: rgba(255, 255, 255, 0.4);
        }

        .dark-theme .progress-bar {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .dark-theme .progress-filled {
            background-color: #ff4d4d;
        }

        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            margin: 0 10px;
            line-height: 40px;
            font-size: 16px;
            font-weight: bold;
        }

        .current-page {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* 修复循环按钮的样式 */
        .repeat-btn {
            background-image: url('https://img.icons8.com/fluency/48/000000/refresh.png');
        }

        .repeat-btn.single {
            background-image: url('https://img.icons8.com/fluency/48/000000/synchronize.png');
        }

        .repeat-btn.random {
            background-image: url('https://img.icons8.com/fluency/48/000000/shuffle.png');
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Music Player</h1>
        <div class="song-list">
            <!-- Song items will be dynamically generated -->
        </div>
        <div class="player-control">
            <div class="time-container">
                <span class="current-time">0:00</span>
                <span class="duration">0:00</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-filled"></div>
                </div>
            </div>
            <div class="controls">
                <div id="repeatBtn" class="control-btn repeat-btn list" title="Repeat Mode"></div>
                <div id="prevBtn" class="control-btn prev-btn" title="Previous"></div>
                <div id="playBtn" class="control-btn play-btn" title="Play"></div>
                <div id="nextBtn" class="control-btn next-btn" title="Next"></div>
                <div id="shuffleBtn" class="control-btn shuffle-btn" title="Shuffle"></div>
            </div>
        </div>
        <div class="pagination">
            <!-- Page buttons will be dynamically generated -->
        </div>
    </div>
    <div class="sidebar">
        <div id="backBtn" class="sidebar-btn back-btn" title="Back"></div>
        <div id="changeBgBtn" class="sidebar-btn change-bg-btn" title="Change Background"></div>

    ];

    // 初始化音乐播放器
    const audio = new Audio();
    let currentSongIndex = 0;
    let isShuffled = false;
    let repeatMode = "list"; // "single", "list", "random"

    // 加载歌曲列表
    function loadSongList(page) {
        const start = (page - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const songListElement = document.querySelector(".song-list");
        songListElement.innerHTML = "";

        songs.slice(start, end).forEach((song, index) => {
            const li = document.createElement("li");
            li.className = "song-item";
            li.innerHTML = `
                <div class="song-title">${song.title}</div>
            `;
            li.addEventListener("click", () => {
                currentSongIndex = start + index;
                loadAndPlaySong();
            });
            songListElement.appendChild(li);
        });
    }

    // 加载并播放当前歌曲
    function loadAndPlaySong() {
        audio.src = songs[currentSongIndex].url;
        audio.play();
        updatePlayerUI();
    }

    // 更新播放器 UI
    function updatePlayerUI() {
        const songItems = document.querySelectorAll(".song-item");
        songItems.forEach((item, index) => {
            if (index === currentSongIndex % itemsPerPage) {
                item.style.backgroundColor = "rgba(255, 255, 255, 0.3)";
            } else {
                item.style.backgroundColor = "rgba(255, 255, 255, 0.2)";
            }
        });
    }

    // 播放/暂停逻辑
    const playBtn = document.getElementById("playBtn");
    playBtn.addEventListener("click", () => {
        if (audio.paused) {
            audio.play();
            playBtn.className = "control-btn pause-btn";
        } else {
            audio.pause();
            playBtn.className = "control-btn play-btn";
        }
    });

    // 进度条控制
    const progressBar = document.querySelector(".progress-bar");
    const progressFilled = document.querySelector(".progress-filled");
    const progressContainer = document.querySelector(".progress-container");

    audio.addEventListener("timeupdate", () => {
        const progress = (audio.currentTime / audio.duration) * 100;
        progressFilled.style.width = `${progress}%`;
        updateCurrentTime();
        updateDuration();
    });

    audio.addEventListener("loadedmetadata", () => {
        updateDuration();
    });

    progressContainer.addEventListener("click", (e) => {
        const width = progressContainer.offsetWidth;
        const clickX = e.offsetX;
        const time = (clickX / width) * audio.duration;
        audio.currentTime = time;
    });

    // 时间显示
    function updateCurrentTime() {
        const currentTime = audio.currentTime;
        const minutes = Math.floor(currentTime / 60);
        const seconds = Math.floor(currentTime % 60);
        document.querySelector(".current-time").textContent = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
    }

    function updateDuration() {
        const duration = audio.duration;
        const minutes = Math.floor(duration / 60);
        const seconds = Math.floor(duration % 60);
        document.querySelector(".duration").textContent = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
    }

    // 下一曲/上一曲
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");

    nextBtn.addEventListener("click", () => {
        if (repeatMode === "random") {
            currentSongIndex = Math.floor(Math.random() * songs.length);
        } else {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
        }
        loadAndPlaySong();
    });

    prevBtn.addEventListener("click", () => {
        currentSongIndex = currentSongIndex === 0 ? songs.length - 1 : currentSongIndex - 1;
        loadAndPlaySong();
    });

    // 循环模式
    const repeatBtn = document.getElementById("repeatBtn");
    repeatBtn.addEventListener("click", () => {
        if (repeatMode === "list") {
            repeatMode = "single";
            repeatBtn.classList.remove("list");
            repeatBtn.classList.add("single");
        } else if (repeatMode === "single") {
            repeatMode = "random";
            repeatBtn.classList.remove("single");
            repeatBtn.classList.add("random");
        } else {
            repeatMode = "list";
            repeatBtn.classList.remove("random");
        }
    });

    audio.addEventListener("ended", () => {
        if (repeatMode === "single") {
            audio.currentTime = 0;
            audio.play();
        } else if (repeatMode === "random") {
            currentSongIndex = Math.floor(Math.random() * songs.length);
            loadAndPlaySong();
        } else {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadAndPlaySong();
        }
    });

    // 分页按钮
    function createPagination() {
        const totalPages = Math.ceil(songs.length / itemsPerPage);
        const paginationElement = document.querySelector(".pagination");
        paginationElement.innerHTML = "";

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement("div");
            btn.className = "page-btn";
            btn.textContent = i;
            if (i === currentPage) {
                btn.classList.add("current-page");
            }
            btn.addEventListener("click", () => {
                currentPage = i;
                loadSongList(currentPage);
                createPagination();
            });
            paginationElement.appendChild(btn);
        }
    }

    // 返回按钮
    const backBtn = document.getElementById("backBtn");
    backBtn.addEventListener("click", () => {
        window.location.href = "https://example.com"; // 替换为你的返回链接
    });

    // 背景切换
    const changeBgBtn = document.getElementById("changeBgBtn");

    // 随机加载初始背景
    window.onload = function() {
        const randomIndex = Math.floor(Math.random() * backgroundImages.length);
        document.body.style.backgroundImage = `url(${backgroundImages[randomIndex]})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
    };

    changeBgBtn.addEventListener("click", () => {
        const randomIndex = Math.floor(Math.random() * backgroundImages.length);
        document.body.style.backgroundImage = `url(${backgroundImages[randomIndex]})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
    });

    // 分页设置
    const itemsPerPage = 5;
    let currentPage = 1;

    // 加载初始歌曲和分页
    loadSongList(currentPage);
    createPagination();

    // 添加切换主题功能
    const switchThemeBtn = document.createElement("div");
    switchThemeBtn.className = "sidebar-btn switch-theme-btn";
    switchThemeBtn.id = "switchThemeBtn";
    switchThemeBtn.title = "Switch Theme";

    document.querySelector(".sidebar").prepend(switchThemeBtn);

    let isDarkMode = true;

    switchThemeBtn.addEventListener("click", () => {
        if (isDarkMode) {
            document.body.classList.add("light-theme");
            document.body.classList.remove("dark-theme");
            isDarkMode = false;
        } else {
            document.body.classList.add("dark-theme");
            document.body.classList.remove("light-theme");
            isDarkMode = true;
        }
    });

    // 默认启用暗色模式
    document.body.classList.add("dark-theme");
</script>
